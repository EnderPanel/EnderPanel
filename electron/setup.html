<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnderPanel - Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a14; --bg-input: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1);
      --text: #fff; --text-dim: #9ca3af; --text-muted: #6b7280;
      --gradient: radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.1) 0%, transparent 70%);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f9fafb; --bg-input: rgba(0,0,0,0.04); --border: rgba(0,0,0,0.12);
        --text: #111827; --text-dim: #6b7280; --text-muted: #9ca3af;
        --gradient: radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.06) 0%, transparent 70%);
      }
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      height: 100vh; display: flex; align-items: center; justify-content: center;
      background-image: var(--gradient);
    }
    .setup { text-align: center; width: 90%; max-width: 420px; }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #a855f7, #ec4899, #a855f7);
      border-radius: 16px; margin: 0 auto 1.5rem; position: relative; overflow: hidden;
      animation: float 3s ease-in-out infinite;
    }
    .logo::before { content: ''; position: absolute; inset: 8px; background: linear-gradient(135deg, #f9a8d4, #c084fc); border-radius: 10px; opacity: 0.8; }
    .logo::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 14px; left: 16px; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    h1 { font-size: 1.75rem; font-weight: 700; background: linear-gradient(90deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
    p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }
    label { display: block; text-align: left; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.5rem; }
    input { width: 100%; padding: 0.875rem 1rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; font-family: inherit; outline: none; margin-bottom: 1.25rem; }
    input:focus { border-color: rgba(168,85,247,0.5); }
    input::placeholder { color: var(--text-muted); }
    button { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, #a855f7, #ec4899); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; box-shadow: 0 8px 25px rgba(168,85,247,0.3); }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .examples { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .examples p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .examples code { background: rgba(168,85,247,0.1); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; color: #c084fc; }
  </style>
</head>
<body>
  <div class="setup">
    <div class="logo"></div>
    <h1>Welcome to EnderPanel</h1>
    <p>Enter the address of your EnderPanel server to get started.</p>
    <label for="ip">Server Address</label>
    <input type="text" id="ip" placeholder="http://192.168.1.100:8000" autofocus />
    <button id="btn">Connect</button>
    <div class="examples">
      <p>Examples:</p>
      <code>http://localhost:8000</code> &nbsp;
      <code>http://192.168.1.100:8000</code>
    </div>
  </div>
  <script>
    document.getElementById('btn').addEventListener('click', connect)
    document.getElementById('ip').addEventListener('keydown', function(e) { if (e.key === 'Enter') connect() })
    function connect() {
      var url = document.getElementById('ip').value.trim()
      if (!url) return
      if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url
      document.getElementById('btn').textContent = 'Connecting...'
      document.getElementById('btn').disabled = true
      window.__ep.save({ serverUrl: url })
    }
  </script>
</body>
</html>
