server {
    listen 80;
    server_name enderpanel.space;

    root /var/www/enderpanel;
    index index.html;

    # ── Install scripts ──────────────────────────────────────────────────────
    location = /install.sh {
        alias /var/www/enderpanel/install.sh;
        add_header Content-Type text/plain;
    }

    location = /install.ps1 {
        alias /var/www/enderpanel/install.ps1;
        add_header Content-Type text/plain;
    }

    # ── Releases ──────────────────────────────────────────────────────────────
    location /releases/ {
        alias /var/www/enderpanel/releases/;
        autoindex off;
        add_header Content-Disposition attachment;
    }

    # ── latest.txt ────────────────────────────────────────────────────────────
    location = /latest.txt {
        alias /var/www/enderpanel/latest.txt;
        add_header Content-Type text/plain;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|py|pyc|db|sqlite|log|sh|json)$ {
        deny all;
        return 404;
    }

    location ~ /(backend|servers|__pycache__|node_modules)/ {
        deny all;
        return 404;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # ── Main site ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
