server {
    listen 80;
    server_name 144.91.87.66 enderpanel.space www.enderpanel.space;

    root /var/www/enderpanel/website;
    index index.html;

    # ── Website (landing page) ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── install.sh ────────────────────────────────────────────────────────────
    location = /install.sh {
        alias /var/www/enderpanel/install.sh;
        add_header Content-Type text/plain;
        add_header Content-Disposition inline;
    }

    # ── install.ps1 ───────────────────────────────────────────────────────────
    location = /install.ps1 {
        alias /var/www/enderpanel/install.ps1;
        add_header Content-Type text/plain;
        add_header Content-Disposition inline;
    }

    # ── Releases ──────────────────────────────────────────────────────────────
    location /releases/ {
        alias /var/www/enderpanel/releases/;
        autoindex off;
        add_header Content-Disposition attachment;
    }

    # ── latest.txt ────────────────────────────────────────────────────────────
    location = /latest.txt {
        alias /var/www/enderpanel/latest.txt;
        add_header Content-Type text/plain;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
